name: Playwright Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-22.04

    steps:

      # STEP 1 - Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # STEP 2 - Set up Node.js (mirrors: Set up JDK 17)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # STEP 3 - Install npm dependencies (mirrors: Maven compile)
      - name: Install dependencies
        run: npm ci

      # STEP 4 - Install Playwright browsers (mirrors: Install Playwright browsers)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      # STEP 5 - Create output directories
      - name: Create output directories
        run: mkdir -p screenshots traces test-output test-results

      # STEP 6 - Run Playwright tests (mirrors: Maven Surefire)
      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      # STEP 7 - Upload HTML report (mirrors: Upload TestNG HTML report)
      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Playwright-HTML-Report
          path: test-output/html-report/
          retention-days: 30

      # STEP 8 - Upload JUnit XML report
      - name: Upload JUnit XML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: JUnit-XML-Report
          path: test-output/junitreports/
          retention-days: 30
          if-no-files-found: ignore

      # STEP 9 - Upload failure screenshots (mirrors: Upload failure screenshots)
      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Failure-Screenshots
          path: screenshots/
          retention-days: 30
          if-no-files-found: ignore

      # STEP 10 - Upload Playwright traces (mirrors: Upload Playwright traces)
      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Playwright-Traces
          path: traces/
          retention-days: 30
          if-no-files-found: ignore
